<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Melon Drop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh
        }

        #gameWrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px
        }

        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 420px;
            padding: 0 10px
        }

        .game-title {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff3cac, #f7d452, #00f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        #scoreDisplay {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f7d452;
            text-shadow: 0 0 10px rgba(247, 212, 82, .4)
        }

        #nextPreview {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            color: #889
        }

        #nextCircle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, .15)
        }

        canvas {
            border-radius: 12px;
            cursor: crosshair;
            display: block
        }

        #gameOver {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 3, 20, .92);
            backdrop-filter: blur(6px);
            border-radius: 12px;
            z-index: 10
        }

        #gameOver h2 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff3cac, #00f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px
        }

        #gameOver .final-score {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f7d452;
            margin-bottom: 20px
        }

        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            min-width: 180px;
            margin: 4px
        }

        .btn-play {
            background: linear-gradient(135deg, #ff3cac, #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255, 60, 172, .3)
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, .5)
        }

        .btn-sec {
            background: rgba(255, 255, 255, .07);
            color: #ccd;
            border: 1px solid rgba(255, 255, 255, .1)
        }

        .btn-sec:hover {
            background: rgba(255, 255, 255, .14)
        }

        #mergeFlash {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            opacity: 0;
            transition: opacity .3s, transform .3s
        }

        #fruitGuide {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 420px
        }

        .guide-fruit {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, .1);
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .guide-arrow {
            color: #556;
            font-size: .7rem
        }

        #dangerLine {
            position: absolute;
            left: 0;
            width: 420px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ef4444, transparent);
            opacity: .4;
            pointer-events: none;
            z-index: 5
        }
    </style>
</head>

<body>
    <div id="gameWrapper">
        <div id="topBar">
            <div class="game-title">NEON MELON DROP</div>
            <div id="scoreDisplay">0</div>
        </div>
        <div id="nextPreview"><span>Next:</span>
            <div id="nextCircle"></div>
        </div>
        <div style="position:relative">
            <canvas id="gameCanvas" width="420" height="600"></canvas>
            <div id="dangerLine" style="top:60px"></div>
            <div id="gameOver">
                <h2>GAME OVER</h2>
                <div class="final-score" id="finalScore">0</div>
                <button class="btn btn-play" onclick="startGame()">Play Again</button>
                <button class="btn btn-sec" onclick="window.location.href='../index.html'">Back to Hub</button>
            </div>
        </div>
        <div id="fruitGuide"></div>
    </div>

    <script>
        // ===== FRUIT DATA =====
        // Each tier: name, radius, color, emoji, points
        const FRUITS = [
            { name: 'Cherry', r: 12, color: '#ef4444', glow: '#ff6b6b', emoji: '🍒', pts: 1 },
            { name: 'Strawberry', r: 16, color: '#f43f5e', glow: '#ff7091', emoji: '🍓', pts: 3 },
            { name: 'Grape', r: 20, color: '#a855f7', glow: '#c084fc', emoji: '🍇', pts: 6 },
            { name: 'Orange', r: 26, color: '#f97316', glow: '#fb923c', emoji: '🍊', pts: 10 },
            { name: 'Apple', r: 32, color: '#22c55e', glow: '#4ade80', emoji: '🍎', pts: 15 },
            { name: 'Pear', r: 38, color: '#84cc16', glow: '#a3e635', emoji: '🍐', pts: 21 },
            { name: 'Peach', r: 44, color: '#f59e0b', glow: '#fbbf24', emoji: '🍑', pts: 28 },
            { name: 'Pineapple', r: 50, color: '#eab308', glow: '#facc15', emoji: '🍍', pts: 36 },
            { name: 'Melon', r: 58, color: '#10b981', glow: '#34d399', emoji: '🍈', pts: 45 },
            { name: 'Watermelon', r: 68, color: '#16a34a', glow: '#4ade80', emoji: '🍉', pts: 100 },
            { name: 'Star', r: 78, color: '#f7d452', glow: '#fde68a', emoji: '⭐', pts: 200 }
        ];

        const W = 420, H = 600;
        const WALL_LEFT = 10, WALL_RIGHT = W - 10, WALL_BOTTOM = H - 10;
        const DANGER_Y = 60;
        const GRAVITY = 0.35;
        const DAMPING = 0.85;
        const FRICTION = 0.92;

        let canvas, ctx;
        let balls = [];
        let score = 0;
        let nextTier = 0;
        let dropX = W / 2;
        let canDrop = true;
        let gameRunning = false;
        let dropCooldown = 0;
        let mouseX = W / 2;

        // ===== INIT =====
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');

        function startGame() {
            balls = [];
            score = 0;
            nextTier = randomSmallTier();
            dropX = W / 2;
            canDrop = true;
            gameRunning = true;
            dropCooldown = 0;
            document.getElementById('gameOver').style.display = 'none';
            updateScore();
            updateNextPreview();
            buildGuide();
            requestAnimationFrame(gameLoop);
        }

        function randomSmallTier() {
            // Only drop small fruits (first 5 tiers)
            return Math.floor(Math.random() * 5);
        }

        function updateScore() {
            document.getElementById('scoreDisplay').textContent = score;
        }

        function updateNextPreview() {
            var circle = document.getElementById('nextCircle');
            var f = FRUITS[nextTier];
            circle.style.background = f.color;
            circle.style.boxShadow = '0 0 12px ' + f.glow;
            circle.style.width = Math.min(30, f.r * 1.5) + 'px';
            circle.style.height = Math.min(30, f.r * 1.5) + 'px';
            circle.textContent = '';
        }

        function buildGuide() {
            var guide = document.getElementById('fruitGuide');
            guide.innerHTML = '';
            for (var i = 0; i < FRUITS.length - 1; i++) {
                var div = document.createElement('div');
                div.className = 'guide-fruit';
                div.style.background = FRUITS[i].color;
                div.style.width = Math.max(14, FRUITS[i].r * .6) + 'px';
                div.style.height = Math.max(14, FRUITS[i].r * .6) + 'px';
                div.title = FRUITS[i].name;
                guide.appendChild(div);
                if (i < FRUITS.length - 2) {
                    var arrow = document.createElement('span');
                    arrow.className = 'guide-arrow';
                    arrow.textContent = '+';
                    guide.appendChild(arrow);
                }
            }
        }

        // ===== INPUT =====
        canvas.addEventListener('mousemove', function (e) {
            var rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            var f = FRUITS[nextTier];
            dropX = Math.max(WALL_LEFT + f.r, Math.min(WALL_RIGHT - f.r, mouseX));
        });

        canvas.addEventListener('click', function (e) {
            if (!gameRunning || !canDrop) return;
            dropFruit();
        });

        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            var f = FRUITS[nextTier];
            dropX = Math.max(WALL_LEFT + f.r, Math.min(WALL_RIGHT - f.r, mouseX));
        }, { passive: false });

        canvas.addEventListener('touchmove', function (e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            var f = FRUITS[nextTier];
            dropX = Math.max(WALL_LEFT + f.r, Math.min(WALL_RIGHT - f.r, mouseX));
        }, { passive: false });

        canvas.addEventListener('touchend', function (e) {
            e.preventDefault();
            if (!gameRunning || !canDrop) return;
            dropFruit();
        }, { passive: false });

        function dropFruit() {
            canDrop = false;
            dropCooldown = 30; // frames before next drop
            var f = FRUITS[nextTier];
            balls.push({
                x: dropX,
                y: DANGER_Y - f.r,
                vx: 0,
                vy: 0,
                r: f.r,
                tier: nextTier,
                settled: 0, // frames since last big movement
                merging: false
            });
            nextTier = randomSmallTier();
            updateNextPreview();
        }

        // ===== PHYSICS =====
        function resolveCollision(a, b) {
            var dx = b.x - a.x;
            var dy = b.y - a.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            var minDist = a.r + b.r;
            if (dist < minDist && dist > 0.01) {
                var nx = dx / dist;
                var ny = dy / dist;
                var overlap = minDist - dist;
                // Push apart
                var totalMass = a.r * a.r + b.r * b.r;
                var ratioA = (b.r * b.r) / totalMass;
                var ratioB = (a.r * a.r) / totalMass;
                a.x -= nx * overlap * ratioA;
                a.y -= ny * overlap * ratioA;
                b.x += nx * overlap * ratioB;
                b.y += ny * overlap * ratioB;
                // Bounce
                var dvx = a.vx - b.vx;
                var dvy = a.vy - b.vy;
                var dvn = dvx * nx + dvy * ny;
                if (dvn > 0) {
                    a.vx -= dvn * nx * ratioA * DAMPING;
                    a.vy -= dvn * ny * ratioA * DAMPING;
                    b.vx += dvn * nx * ratioB * DAMPING;
                    b.vy += dvn * ny * ratioB * DAMPING;
                }
                return true;
            }
            return false;
        }

        function checkMerges() {
            for (var i = 0; i < balls.length; i++) {
                for (var j = i + 1; j < balls.length; j++) {
                    var a = balls[i], b = balls[j];
                    if (a.merging || b.merging) continue;
                    if (a.tier !== b.tier) continue;
                    if (a.tier >= FRUITS.length - 1) continue; // max tier
                    var dx = b.x - a.x;
                    var dy = b.y - a.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < a.r + b.r) {
                        // MERGE!
                        var newTier = a.tier + 1;
                        var nf = FRUITS[newTier];
                        var mx = (a.x + b.x) / 2;
                        var my = (a.y + b.y) / 2;
                        a.merging = true;
                        b.merging = true;
                        // Spawn merged fruit
                        balls.push({
                            x: mx, y: my,
                            vx: (a.vx + b.vx) * .3,
                            vy: Math.min(-2, (a.vy + b.vy) * .3),
                            r: nf.r,
                            tier: newTier,
                            settled: 0,
                            merging: false,
                            flash: 1 // visual flash
                        });
                        score += nf.pts;
                        updateScore();
                        spawnMergeEffect(mx, my, nf.color, nf.r);
                        // Remove old fruits (backwards to preserve indices)
                        balls = balls.filter(function (ball) { return !ball.merging; });
                        return true; // restart merge check since array changed
                    }
                }
            }
            return false;
        }

        function spawnMergeEffect(x, y, color, r) {
            // Simple canvas flash - stored in an effects array
            mergeEffects.push({ x: x, y: y, color: color, r: r, life: 1 });
        }
        var mergeEffects = [];

        function physicsTick() {
            // Gravity
            for (var i = 0; i < balls.length; i++) {
                var b = balls[i];
                b.vy += GRAVITY;
                b.vx *= FRICTION;
                b.x += b.vx;
                b.y += b.vy;
                // Wall collisions
                if (b.x - b.r < WALL_LEFT) { b.x = WALL_LEFT + b.r; b.vx = Math.abs(b.vx) * DAMPING; }
                if (b.x + b.r > WALL_RIGHT) { b.x = WALL_RIGHT - b.r; b.vx = -Math.abs(b.vx) * DAMPING; }
                if (b.y + b.r > WALL_BOTTOM) { b.y = WALL_BOTTOM - b.r; b.vy = -Math.abs(b.vy) * DAMPING; if (Math.abs(b.vy) < 0.5) b.vy = 0; }
                // Track settling
                if (Math.abs(b.vx) + Math.abs(b.vy) < .5) b.settled++;
                else b.settled = 0;
            }
            // Ball-ball collisions (multiple passes for stability)
            for (var pass = 0; pass < 5; pass++) {
                for (var i = 0; i < balls.length; i++) {
                    for (var j = i + 1; j < balls.length; j++) {
                        resolveCollision(balls[i], balls[j]);
                    }
                }
            }
            // Clamp to bounds again after resolution
            for (var i = 0; i < balls.length; i++) {
                var b = balls[i];
                if (b.x - b.r < WALL_LEFT) b.x = WALL_LEFT + b.r;
                if (b.x + b.r > WALL_RIGHT) b.x = WALL_RIGHT - b.r;
                if (b.y + b.r > WALL_BOTTOM) b.y = WALL_BOTTOM - b.r;
            }
            // Merges
            var merged = true;
            var mergeCount = 0;
            while (merged && mergeCount < 10) {
                merged = checkMerges();
                mergeCount++;
            }
        }

        // ===== GAME OVER CHECK =====
        function checkGameOver() {
            for (var i = 0; i < balls.length; i++) {
                var b = balls[i];
                // Only check settled balls (not ones still falling)
                if (b.settled > 60 && b.y - b.r < DANGER_Y) {
                    return true;
                }
            }
            return false;
        }

        // ===== RENDER =====
        function render() {
            ctx.clearRect(0, 0, W, H);
            // Background gradient
            var grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0a0a1a');
            grad.addColorStop(1, '#0d0520');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            // Container walls
            ctx.strokeStyle = 'rgba(139,92,246,.4)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(WALL_LEFT, 0);
            ctx.lineTo(WALL_LEFT, WALL_BOTTOM);
            ctx.lineTo(WALL_RIGHT, WALL_BOTTOM);
            ctx.lineTo(WALL_RIGHT, 0);
            ctx.stroke();
            // Wall glow
            ctx.shadowColor = '#8b5cf6';
            ctx.shadowBlur = 8;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Danger line
            ctx.strokeStyle = 'rgba(239,68,68,.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(WALL_LEFT, DANGER_Y);
            ctx.lineTo(WALL_RIGHT, DANGER_Y);
            ctx.stroke();
            ctx.setLineDash([]);
            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,.02)';
            ctx.lineWidth = 1;
            for (var y = 100; y < H; y += 40) {
                ctx.beginPath(); ctx.moveTo(WALL_LEFT, y); ctx.lineTo(WALL_RIGHT, y); ctx.stroke();
            }
            // Drop guide line
            if (canDrop && gameRunning) {
                var f = FRUITS[nextTier];
                ctx.strokeStyle = 'rgba(255,255,255,.15)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 6]);
                ctx.beginPath();
                ctx.moveTo(dropX, DANGER_Y);
                ctx.lineTo(dropX, WALL_BOTTOM);
                ctx.stroke();
                ctx.setLineDash([]);
                // Preview fruit at drop position
                ctx.globalAlpha = .4;
                ctx.beginPath();
                ctx.arc(dropX, DANGER_Y - f.r, f.r, 0, Math.PI * 2);
                ctx.fillStyle = f.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            // Merge effects
            for (var i = mergeEffects.length - 1; i >= 0; i--) {
                var eff = mergeEffects[i];
                ctx.globalAlpha = eff.life * .5;
                ctx.beginPath();
                ctx.arc(eff.x, eff.y, eff.r * (2 - eff.life), 0, Math.PI * 2);
                ctx.fillStyle = eff.color;
                ctx.fill();
                // Ring
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(eff.x, eff.y, eff.r * (2.5 - eff.life * 1.5), 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                eff.life -= .04;
                if (eff.life <= 0) mergeEffects.splice(i, 1);
            }
            // Balls
            for (var i = 0; i < balls.length; i++) {
                var b = balls[i];
                var f = FRUITS[b.tier];
                // Glow
                ctx.shadowColor = f.glow;
                ctx.shadowBlur = b.flash ? 20 : 8;
                // Body
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                var bodyGrad = ctx.createRadialGradient(b.x - b.r * .3, b.y - b.r * .3, b.r * .1, b.x, b.y, b.r);
                bodyGrad.addColorStop(0, f.glow);
                bodyGrad.addColorStop(1, f.color);
                ctx.fillStyle = bodyGrad;
                ctx.fill();
                ctx.shadowBlur = 0;
                // Border
                ctx.strokeStyle = 'rgba(255,255,255,.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Emoji
                ctx.font = Math.max(10, b.r * .8) + 'px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji, b.x, b.y);
                // Flash effect for newly merged
                if (b.flash) {
                    b.flash -= .03;
                    if (b.flash <= 0) b.flash = 0;
                    ctx.globalAlpha = b.flash * .5;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r * 1.3, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        // ===== GAME LOOP =====
        function gameLoop() {
            if (!gameRunning) return;
            // Cooldown for drops
            if (dropCooldown > 0) {
                dropCooldown--;
                if (dropCooldown === 0) canDrop = true;
            }
            physicsTick();
            render();
            // Game over check
            if (checkGameOver()) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'flex';
                return;
            }
            requestAnimationFrame(gameLoop);
        }

        // ===== START =====
        startGame();
    </script>
</body>

</html>
