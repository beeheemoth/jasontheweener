<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Idle Space Bakery — JasontheWeener</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0f;
            color: #e1e1e6;
            overflow: hidden;
            height: 100vh;
            display: flex
        }

        /* ===== LEFT: Cookie Area ===== */
        .cookie-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-width: 0
        }

        .cookie-stats {
            text-align: center;
            margin-bottom: 20px;
            z-index: 2
        }

        .cookie-count {
            font-size: 2.4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .cookie-label {
            font-size: .95rem;
            color: #888;
            font-weight: 600
        }

        .cps-display {
            font-size: .8rem;
            color: #666;
            margin-top: 4px
        }

        .cps-display span {
            color: #8b5cf6;
            font-weight: 700
        }

        .cookie-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid rgba(139, 92, 246, .4);
            background: radial-gradient(circle at 35% 35%, #2a1a4e, #1a0e30 60%, #0d0620);
            cursor: pointer;
            transition: transform .08s;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 40px rgba(139, 92, 246, .2), 0 0 80px rgba(139, 92, 246, .1), inset 0 0 30px rgba(139, 92, 246, .15)
        }

        .cookie-btn:hover {
            box-shadow: 0 0 50px rgba(139, 92, 246, .35), 0 0 100px rgba(139, 92, 246, .15), inset 0 0 40px rgba(139, 92, 246, .2)
        }

        .cookie-btn:active {
            transform: scale(.93)
        }

        .cookie-inner {
            position: absolute;
            inset: 15px;
            border-radius: 50%;
            border: 2px solid rgba(139, 92, 246, .25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem
        }

        /* Chips on cookie */
        .chip {
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle, #8b5cf6, #5b21b6);
            box-shadow: 0 0 8px rgba(139, 92, 246, .6)
        }

        /* Click floaters */
        .float-text {
            position: absolute;
            font-weight: 900;
            color: #8b5cf6;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 10;
            animation: floatUp .8s ease-out forwards;
            text-shadow: 0 0 10px rgba(139, 92, 246, .5)
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1)
            }

            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1.3)
            }
        }

        /* Click multiplier display */
        .click-power {
            margin-top: 12px;
            font-size: .75rem;
            color: #555;
            z-index: 2
        }

        .click-power span {
            color: #ec4899;
            font-weight: 700
        }

        /* Particles */
        .bg-particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0
        }

        .bg-particles .p {
            position: absolute;
            border-radius: 50%;
            opacity: .3;
            animation: drift linear infinite
        }

        @keyframes drift {
            0% {
                transform: translateY(100vh) rotate(0)
            }

            100% {
                transform: translateY(-20px) rotate(360deg)
            }
        }

        /* ===== RIGHT: Shop ===== */
        .shop {
            width: 360px;
            height: 100vh;
            background: rgba(12, 12, 20, .95);
            border-left: 1px solid rgba(139, 92, 246, .15);
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .shop-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, .06)
        }

        .shop-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: .8rem;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Outfit', sans-serif;
            transition: .2s;
            border-bottom: 2px solid transparent
        }

        .shop-tab.active {
            color: #8b5cf6;
            border-bottom-color: #8b5cf6
        }

        .shop-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px
        }

        .shop-list::-webkit-scrollbar {
            width: 4px
        }

        .shop-list::-webkit-scrollbar-track {
            background: transparent
        }

        .shop-list::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, .3);
            border-radius: 4px
        }

        /* Building card */
        .building {
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .06);
            margin-bottom: 6px;
            cursor: pointer;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .building:hover {
            border-color: rgba(139, 92, 246, .3);
            background: rgba(139, 92, 246, .05)
        }

        .building.locked {
            opacity: .35;
            pointer-events: none
        }

        .building.cant-afford {
            opacity: .5
        }

        .b-icon {
            font-size: 1.6rem;
            width: 40px;
            text-align: center;
            flex-shrink: 0
        }

        .b-info {
            flex: 1;
            min-width: 0
        }

        .b-name {
            font-size: .82rem;
            font-weight: 700;
            color: #ddd
        }

        .b-cost {
            font-size: .72rem;
            color: #8b5cf6;
            font-weight: 600
        }

        .b-desc {
            font-size: .65rem;
            color: #555;
            margin-top: 1px
        }

        .b-count {
            font-size: 1.1rem;
            font-weight: 900;
            color: #8b5cf6;
            width: 30px;
            text-align: center;
            flex-shrink: 0
        }

        /* Upgrade card */
        .upgrade {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .04);
            border: 2px solid rgba(255, 255, 255, .08);
            font-size: 1.4rem;
            cursor: pointer;
            transition: .2s;
            margin: 3px;
            position: relative
        }

        .upgrade:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, .1)
        }

        .upgrade.bought {
            opacity: .25;
            pointer-events: none;
            border-color: #22c55e
        }

        .upgrade.cant-afford {
            opacity: .4
        }

        .upgrade-tooltip {
            display: none;
            position: absolute;
            bottom: 58px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, .95);
            border: 1px solid rgba(139, 92, 246, .3);
            border-radius: 10px;
            padding: 10px 14px;
            width: 200px;
            z-index: 20;
            text-align: left
        }

        .upgrade:hover .upgrade-tooltip {
            display: block
        }

        .upgrade-tooltip .ut-name {
            font-size: .8rem;
            font-weight: 700;
            color: #ec4899
        }

        .upgrade-tooltip .ut-cost {
            font-size: .7rem;
            color: #8b5cf6;
            margin: 2px 0
        }

        .upgrade-tooltip .ut-desc {
            font-size: .68rem;
            color: #888
        }

        /* Achievement */
        .achievement-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, .92);
            border: 1px solid rgba(34, 197, 94, .4);
            border-radius: 12px;
            padding: 12px 24px;
            z-index: 50;
            text-align: center;
            animation: popIn .4s ease-out, fadeOut .4s ease-in 2.6s forwards;
            backdrop-filter: blur(10px)
        }

        .achievement-popup .ap-title {
            font-size: .7rem;
            color: #22c55e;
            font-weight: 700
        }

        .achievement-popup .ap-name {
            font-size: .95rem;
            font-weight: 800;
            color: #fff
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px)
            }

            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0)
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px)
            }
        }

        /* Stats panel */
        .stats-panel {
            padding: 12px;
            border-top: 1px solid rgba(255, 255, 255, .06)
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: .72rem;
            color: #555;
            padding: 3px 0
        }

        .stat-row span {
            color: #999;
            font-weight: 600
        }

        /* Responsive */
        @media (max-width: 700px) {
            body {
                flex-direction: column
            }

            .cookie-area {
                height: 45vh
            }

            .shop {
                width: 100%;
                height: 55vh;
                border-left: none;
                border-top: 1px solid rgba(139, 92, 246, .15)
            }

            .cookie-btn {
                width: 160px;
                height: 160px
            }

            .cookie-count {
                font-size: 1.8rem
            }
        }
    </style>
</head>

<body>
    <!-- BG Particles -->
    <div class="bg-particles" id="bgParts"></div>

    <!-- Cookie Area -->
    <div class="cookie-area">
        <div class="cookie-stats">
            <div class="cookie-count" id="cookieCount">0</div>
            <div class="cookie-label">cookies</div>
            <div class="cps-display">per second: <span id="cpsDisplay">0</span></div>
        </div>
        <div class="cookie-btn" id="cookieBtn" onclick="clickCookie(event)">
            <div class="cookie-inner">🍪</div>
            <div class="chip" style="top:25%;left:20%"></div>
            <div class="chip" style="top:60%;left:25%"></div>
            <div class="chip" style="top:35%;left:65%"></div>
            <div class="chip" style="top:70%;left:60%"></div>
            <div class="chip" style="top:15%;left:48%"></div>
            <div class="chip" style="top:75%;left:42%"></div>
            <div class="chip" style="top:45%;left:40%"></div>
        </div>
        <div class="click-power">Click power: <span id="clickPower">1</span> cookie(s)</div>
    </div>

    <!-- Shop -->
    <div class="shop">
        <div class="shop-tabs">
            <button class="shop-tab active" onclick="switchTab('buildings')">🏗 Buildings</button>
            <button class="shop-tab" onclick="switchTab('upgrades')">⬆ Upgrades</button>
            <button class="shop-tab" onclick="switchTab('stats')">📊 Stats</button>
        </div>
        <div class="shop-list" id="shopList"></div>
    </div>

    <script>
        // ===== BG PARTICLES =====
        const bgParts = document.getElementById('bgParts');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'p';
            const size = Math.random() * 4 + 1;
            const hue = Math.random() * 60 + 250;
            p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;background:hsl(${hue},70%,60%);animation-duration:${8 + Math.random() * 15}s;animation-delay:${Math.random() * -20}s`;
            bgParts.appendChild(p);
        }

        // ===== GAME DATA =====
        const BUILDINGS = [
            { id: 'cursor', name: 'Auto Cursor', icon: '👆', baseCost: 15, baseCps: .1, desc: 'Clicks cookies automatically' },
            { id: 'grandma', name: 'Neon Grandma', icon: '👵', baseCost: 100, baseCps: 1, desc: 'A nice grandma baking neon cookies' },
            { id: 'farm', name: 'Cookie Farm', icon: '🌾', baseCost: 1100, baseCps: 8, desc: 'Grows cookie plants in neon soil' },
            { id: 'mine', name: 'Cookie Mine', icon: '⛏️', baseCost: 12000, baseCps: 47, desc: 'Mines cookie dough from the earth' },
            { id: 'factory', name: 'Cookie Factory', icon: '🏭', baseCost: 130000, baseCps: 260, desc: 'Produces cookies at scale' },
            { id: 'bank', name: 'Cookie Bank', icon: '🏦', baseCost: 1400000, baseCps: 1400, desc: 'Generates cookies from interest' },
            { id: 'temple', name: 'Cookie Temple', icon: '🛕', baseCost: 20000000, baseCps: 7800, desc: 'Prays cookies into existence' },
            { id: 'wizard', name: 'Wizard Tower', icon: '🧙', baseCost: 330000000, baseCps: 44000, desc: 'Conjures cookies with magic' },
            { id: 'ship', name: 'Cookie Ship', icon: '🚀', baseCost: 5100000000, baseCps: 260000, desc: 'Imports cookies from space' },
            { id: 'lab', name: 'Alchemy Lab', icon: '⚗️', baseCost: 75000000000, baseCps: 1600000, desc: 'Transmutes gold into cookies' },
            { id: 'portal', name: 'Portal', icon: '🌀', baseCost: 1000000000000, baseCps: 10000000, desc: 'Opens a portal to the cookieverse' },
            { id: 'machine', name: 'Time Machine', icon: '⏳', baseCost: 14000000000000, baseCps: 65000000, desc: 'Brings cookies from the past' }
        ];

        const UPGRADES = [
            // Click upgrades
            { id: 'click1', name: 'Reinforced Index', icon: '☝️', cost: 100, desc: 'Clicking power x2', type: 'click', mult: 2 },
            { id: 'click2', name: 'Cyber Fingers', icon: '🤖', cost: 500, desc: 'Clicking power x2', type: 'click', mult: 2 },
            { id: 'click3', name: 'Neon Nails', icon: '💅', cost: 10000, desc: 'Clicking power x5', type: 'click', mult: 5 },
            { id: 'click4', name: 'Quantum Click', icon: '⚛️', cost: 500000, desc: 'Clicking power x10', type: 'click', mult: 10 },
            { id: 'click5', name: 'Void Touch', icon: '🕳️', cost: 50000000, desc: 'Clicking power x25', type: 'click', mult: 25 },
            // Building multipliers 
            { id: 'cursor1', name: 'Faster Cursors', icon: '⚡', cost: 100, desc: 'Cursors are twice as efficient', type: 'building', target: 'cursor', mult: 2 },
            { id: 'cursor2', name: 'Turbo Cursors', icon: '💨', cost: 500, desc: 'Cursors are twice as efficient', type: 'building', target: 'cursor', mult: 2 },
            { id: 'grandma1', name: 'Better Rolling Pins', icon: '🎳', cost: 1000, desc: 'Grandmas are twice as efficient', type: 'building', target: 'grandma', mult: 2 },
            { id: 'grandma2', name: 'Secret Recipe', icon: '📜', cost: 5000, desc: 'Grandmas are twice as efficient', type: 'building', target: 'grandma', mult: 2 },
            { id: 'farm1', name: 'Neon Fertilizer', icon: '🧪', cost: 11000, desc: 'Farms are twice as efficient', type: 'building', target: 'farm', mult: 2 },
            { id: 'farm2', name: 'Cookie Seeds', icon: '🌱', cost: 55000, desc: 'Farms are twice as efficient', type: 'building', target: 'farm', mult: 2 },
            { id: 'mine1', name: 'Deeper Shafts', icon: '🔩', cost: 120000, desc: 'Mines are twice as efficient', type: 'building', target: 'mine', mult: 2 },
            { id: 'mine2', name: 'Diamond Picks', icon: '💎', cost: 600000, desc: 'Mines are twice as efficient', type: 'building', target: 'mine', mult: 2 },
            { id: 'factory1', name: 'Assembly Lines', icon: '🔧', cost: 1300000, desc: 'Factories are twice as efficient', type: 'building', target: 'factory', mult: 2 },
            { id: 'factory2', name: 'Automation', icon: '🤖', cost: 6500000, desc: 'Factories are twice as efficient', type: 'building', target: 'factory', mult: 2 },
            { id: 'bank1', name: 'Interest Rates', icon: '📈', cost: 14000000, desc: 'Banks are twice as efficient', type: 'building', target: 'bank', mult: 2 },
            { id: 'temple1', name: 'Sun Worship', icon: '☀️', cost: 200000000, desc: 'Temples are twice as efficient', type: 'building', target: 'temple', mult: 2 },
            { id: 'wizard1', name: 'Cookie Spells', icon: '✨', cost: 3300000000, desc: 'Wizard Towers are twice as efficient', type: 'building', target: 'wizard', mult: 2 },
            { id: 'ship1', name: 'Warp Drive', icon: '🌌', cost: 51000000000, desc: 'Cookie Ships are twice as efficient', type: 'building', target: 'ship', mult: 2 },
            // Global multipliers
            { id: 'global1', name: 'Lucky Day', icon: '🍀', cost: 77777, desc: 'All production x2', type: 'global', mult: 2 },
            { id: 'global2', name: 'Golden Age', icon: '👑', cost: 7777777, desc: 'All production x2', type: 'global', mult: 2 },
            { id: 'global3', name: 'Neon Overflow', icon: '🌊', cost: 777777777, desc: 'All production x3', type: 'global', mult: 3 }
        ];

        const ACHIEVEMENTS = [
            { id: 'first', name: 'First Cookie', desc: 'Click the cookie', check: s => s.totalClicks >= 1 },
            { id: 'click100', name: 'Centurion', desc: 'Click 100 times', check: s => s.totalClicks >= 100 },
            { id: 'click1000', name: 'Click Machine', desc: 'Click 1,000 times', check: s => s.totalClicks >= 1000 },
            { id: 'click10000', name: 'Carpal Tunnel', desc: 'Click 10,000 times', check: s => s.totalClicks >= 10000 },
            { id: 'bake100', name: 'Apprentice Baker', desc: 'Bake 100 cookies', check: s => s.totalBaked >= 100 },
            { id: 'bake1k', name: 'Cookie Maker', desc: 'Bake 1,000 cookies', check: s => s.totalBaked >= 1000 },
            { id: 'bake100k', name: 'Cookie Monster', desc: 'Bake 100,000 cookies', check: s => s.totalBaked >= 100000 },
            { id: 'bake1m', name: 'Cookie Tycoon', desc: 'Bake 1 million cookies', check: s => s.totalBaked >= 1000000 },
            { id: 'bake1b', name: 'Cookie God', desc: 'Bake 1 billion cookies', check: s => s.totalBaked >= 1000000000 },
            { id: 'cps10', name: 'Getting Started', desc: 'Reach 10 CPS', check: s => s.cps >= 10 },
            { id: 'cps100', name: 'Production Line', desc: 'Reach 100 CPS', check: s => s.cps >= 100 },
            { id: 'cps1000', name: 'Mass Production', desc: 'Reach 1,000 CPS', check: s => s.cps >= 1000 },
            { id: 'cps1m', name: 'Cookie Empire', desc: 'Reach 1,000,000 CPS', check: s => s.cps >= 1000000 },
            { id: 'b1', name: 'First Cursor', desc: 'Buy a Cursor', check: s => (s.buildings.cursor || 0) >= 1 },
            { id: 'b10', name: 'Cursor Army', desc: 'Own 10 Cursors', check: s => (s.buildings.cursor || 0) >= 10 },
            { id: 'gran1', name: 'Hired Help', desc: 'Buy a Grandma', check: s => (s.buildings.grandma || 0) >= 1 },
            { id: 'farm1a', name: 'Green Thumb', desc: 'Buy a Farm', check: s => (s.buildings.farm || 0) >= 1 },
            { id: 'fac1', name: 'Industrialist', desc: 'Buy a Factory', check: s => (s.buildings.factory || 0) >= 1 },
            { id: 'ship1a', name: 'Space Cookie', desc: 'Buy a Cookie Ship', check: s => (s.buildings.ship || 0) >= 1 },
            { id: 'upg5', name: 'Upgrader', desc: 'Buy 5 upgrades', check: s => s.upgradesBought >= 5 },
            { id: 'upg15', name: 'Upgrade Master', desc: 'Buy 15 upgrades', check: s => s.upgradesBought >= 15 }
        ];

        // ===== GAME STATE =====
        let cookies = 0, totalBaked = 0, totalClicks = 0;
        let clickPower = 1, globalMult = 1;
        let buildings = {};
        let buildingMults = {};
        let boughtUpgrades = {};
        let earnedAchievements = {};
        let currentTab = 'buildings';

        BUILDINGS.forEach(b => { buildings[b.id] = 0; buildingMults[b.id] = 1 });

        // ===== FORMATTING =====
        function fmt(n) {
            if (n < 1000) return Math.floor(n).toLocaleString();
            const suffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc'];
            const tier = Math.floor(Math.log10(Math.abs(n)) / 3);
            if (tier === 0) return Math.floor(n).toLocaleString();
            const suffix = suffixes[tier] || 'e' + tier * 3;
            const scale = Math.pow(10, tier * 3);
            const scaled = n / scale;
            return scaled.toFixed(scaled < 10 ? 2 : scaled < 100 ? 1 : 0) + ' ' + suffix;
        }

        // ===== CPS CALC =====
        function getCps() {
            let cps = 0;
            BUILDINGS.forEach(b => {
                cps += buildings[b.id] * b.baseCps * buildingMults[b.id];
            });
            return cps * globalMult;
        }

        function getBuildingCost(b, count) {
            return Math.floor(b.baseCost * Math.pow(1.15, count));
        }

        // ===== CLICK =====
        function clickCookie(e) {
            const earned = clickPower;
            cookies += earned;
            totalBaked += earned;
            totalClicks++;

            // Float text
            const btn = document.getElementById('cookieBtn');
            const rect = btn.getBoundingClientRect();
            const float = document.createElement('div');
            float.className = 'float-text';
            float.textContent = '+' + fmt(earned);
            float.style.left = (e.clientX - rect.left - 15) + 'px';
            float.style.top = (e.clientY - rect.top - 15) + 'px';
            btn.appendChild(float);
            setTimeout(() => float.remove(), 800);

            updateDisplay();
            checkAchievements();
        }

        // ===== BUY BUILDING =====
        function buyBuilding(id) {
            const b = BUILDINGS.find(x => x.id === id);
            const cost = getBuildingCost(b, buildings[id]);
            if (cookies < cost) return;
            cookies -= cost;
            buildings[id]++;
            updateDisplay();
            renderShop();
            checkAchievements();
            save();
        }

        // ===== BUY UPGRADE =====
        function buyUpgrade(id) {
            const u = UPGRADES.find(x => x.id === id);
            if (boughtUpgrades[id] || cookies < u.cost) return;
            cookies -= u.cost;
            boughtUpgrades[id] = true;

            if (u.type === 'click') clickPower *= u.mult;
            else if (u.type === 'building') buildingMults[u.target] *= u.mult;
            else if (u.type === 'global') globalMult *= u.mult;

            updateDisplay();
            renderShop();
            checkAchievements();
            save();
        }

        // ===== DISPLAY =====
        function updateDisplay() {
            const cps = getCps();
            document.getElementById('cookieCount').textContent = fmt(cookies);
            document.getElementById('cpsDisplay').textContent = fmt(cps);
            document.getElementById('clickPower').textContent = fmt(clickPower);
            document.title = `${fmt(cookies)} treats — Idle Space Bakery`;
        }

        // ===== SHOP TABS =====
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shopList');

            if (currentTab === 'buildings') {
                let html = '';
                BUILDINGS.forEach(b => {
                    const count = buildings[b.id];
                    const cost = getBuildingCost(b, count);
                    const canAfford = cookies >= cost;
                    const cps = b.baseCps * buildingMults[b.id] * globalMult;
                    const locked = cost > cookies * 1000 && count === 0;
                    html += `<div class="building ${locked ? 'locked' : ''} ${!canAfford && !locked ? 'cant-afford' : ''}" onclick="buyBuilding('${b.id}')">
                        <div class="b-icon">${b.icon}</div>
                        <div class="b-info">
                            <div class="b-name">${b.name}</div>
                            <div class="b-cost">🍪 ${fmt(cost)} · ${fmt(cps)}/s each</div>
                            <div class="b-desc">${b.desc}</div>
                        </div>
                        <div class="b-count">${count}</div>
                    </div>`;
                });
                list.innerHTML = html;
            } else if (currentTab === 'upgrades') {
                let html = '<div style="padding:6px;display:flex;flex-wrap:wrap;align-content:start">';
                UPGRADES.forEach(u => {
                    const bought = !!boughtUpgrades[u.id];
                    const canAfford = cookies >= u.cost;
                    html += `<div class="upgrade ${bought ? 'bought' : ''} ${!canAfford && !bought ? 'cant-afford' : ''}" onclick="buyUpgrade('${u.id}')">
                        ${u.icon}
                        <div class="upgrade-tooltip">
                            <div class="ut-name">${u.name}</div>
                            <div class="ut-cost">🍪 ${fmt(u.cost)}</div>
                            <div class="ut-desc">${u.desc}</div>
                        </div>
                    </div>`;
                });
                html += '</div>';
                list.innerHTML = html;
            } else {
                const cps = getCps();
                const upgradesBought = Object.keys(boughtUpgrades).length;
                const achievementCount = Object.keys(earnedAchievements).length;
                const totalBuildings = Object.values(buildings).reduce((a, b) => a + b, 0);

                let html = `<div class="stats-panel">
                    <h3 style="color:#8b5cf6;font-size:.9rem;margin-bottom:8px">📊 Statistics</h3>
                    <div class="stat-row">Cookies baked (all time) <span>${fmt(totalBaked)}</span></div>
                    <div class="stat-row">Cookies in bank <span>${fmt(cookies)}</span></div>
                    <div class="stat-row">Cookies per second <span>${fmt(cps)}</span></div>
                    <div class="stat-row">Cookies per click <span>${fmt(clickPower)}</span></div>
                    <div class="stat-row">Total clicks <span>${totalClicks.toLocaleString()}</span></div>
                    <div class="stat-row">Buildings owned <span>${totalBuildings}</span></div>
                    <div class="stat-row">Upgrades purchased <span>${upgradesBought}/${UPGRADES.length}</span></div>
                    <div class="stat-row">Achievements <span>${achievementCount}/${ACHIEVEMENTS.length}</span></div>
                    <div class="stat-row">Global multiplier <span>x${globalMult}</span></div>
                    <h3 style="color:#22c55e;font-size:.9rem;margin:14px 0 8px">🏆 Achievements</h3>`;

                ACHIEVEMENTS.forEach(a => {
                    const earned = !!earnedAchievements[a.id];
                    html += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;opacity:${earned ? 1 : .3}">
                        <span style="font-size:.9rem">${earned ? '✅' : '🔒'}</span>
                        <div><div style="font-size:.75rem;font-weight:700;color:${earned ? '#22c55e' : '#555'}">${a.name}</div>
                        <div style="font-size:.65rem;color:#666">${a.desc}</div></div>
                    </div>`;
                });

                html += `<div style="margin-top:16px;display:flex;gap:6px">
                    <button onclick="save()" style="flex:1;padding:8px;border:none;border-radius:8px;background:rgba(34,197,94,.12);color:#22c55e;font-weight:700;cursor:pointer;font-family:Outfit;font-size:.75rem">💾 Save</button>
                    <button onclick="if(confirm('Wipe all progress?')){localStorage.removeItem('jtw_cookie');location.reload()}" style="flex:1;padding:8px;border:none;border-radius:8px;background:rgba(239,68,68,.12);color:#ef4444;font-weight:700;cursor:pointer;font-family:Outfit;font-size:.75rem">🗑 Reset</button>
                </div></div>`;
                list.innerHTML = html;
            }
        }

        // ===== ACHIEVEMENTS =====
        function checkAchievements() {
            const cps = getCps();
            const state = {
                totalClicks, totalBaked, cps, buildings,
                upgradesBought: Object.keys(boughtUpgrades).length
            };
            ACHIEVEMENTS.forEach(a => {
                if (!earnedAchievements[a.id] && a.check(state)) {
                    earnedAchievements[a.id] = true;
                    showAchievement(a);
                }
            });
        }

        function showAchievement(a) {
            const popup = document.createElement('div');
            popup.className = 'achievement-popup';
            popup.innerHTML = `<div class="ap-title">🏆 Achievement Unlocked!</div><div class="ap-name">${a.name}</div>`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
        }

        // ===== SAVE / LOAD =====
        function save() {
            const data = { cookies, totalBaked, totalClicks, clickPower, globalMult, buildings, buildingMults, boughtUpgrades, earnedAchievements, timestamp: Date.now() };
            localStorage.setItem('jtw_cookie', JSON.stringify(data));
        }

        function load() {
            const raw = localStorage.getItem('jtw_cookie');
            if (!raw) return;
            try {
                const d = JSON.parse(raw);
                cookies = d.cookies || 0;
                totalBaked = d.totalBaked || 0;
                totalClicks = d.totalClicks || 0;
                clickPower = d.clickPower || 1;
                globalMult = d.globalMult || 1;
                if (d.buildings) Object.assign(buildings, d.buildings);
                if (d.buildingMults) Object.assign(buildingMults, d.buildingMults);
                if (d.boughtUpgrades) boughtUpgrades = d.boughtUpgrades;
                if (d.earnedAchievements) earnedAchievements = d.earnedAchievements;
                // Offline earnings
                if (d.timestamp) {
                    const elapsed = (Date.now() - d.timestamp) / 1000;
                    const offlineEarn = getCps() * elapsed * .5; // 50% offline rate
                    if (offlineEarn > 1) {
                        cookies += offlineEarn;
                        totalBaked += offlineEarn;
                    }
                }
            } catch (e) { }
        }

        // ===== GAME LOOP =====
        let lastTick = Date.now();
        function tick() {
            const now = Date.now();
            const dt = (now - lastTick) / 1000;
            lastTick = now;

            const earned = getCps() * dt;
            cookies += earned;
            totalBaked += earned;

            updateDisplay();
        }

        // ===== INIT =====
        load();
        updateDisplay();
        renderShop();
        checkAchievements();

        setInterval(tick, 50);
        setInterval(() => { renderShop() }, 1000);
        setInterval(save, 30000); // Autosave every 30s
    </script>
</body>

</html>
