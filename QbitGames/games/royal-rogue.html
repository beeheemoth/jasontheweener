<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Royal Rogue - Roguelike Deck Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap');

        body {
            background: #0a0a1a;
            color: #e2e8f0;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            min-height: 100vh
        }

        :root {
            --accent: #8b5cf6;
            --accent2: #22d3ee;
            --gold: #f7d452;
            --pink: #ff3cac;
            --green: #22c55e;
            --red: #ef4444;
            --panel: rgba(15, 15, 35, .85);
            --panel2: rgba(20, 20, 45, .9)
        }

        /* Back button */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            background: var(--panel);
            border: 1px solid rgba(139, 92, 246, .3);
            color: var(--accent);
            padding: 8px 18px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 700;
            font-size: .85rem;
            cursor: pointer;
            transition: .3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .back-btn:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 20px rgba(139, 92, 246, .4)
        }

        /* Header */
        .game-header {
            text-align: center;
            padding: 20px 16px 10px
        }

        .game-header h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--pink), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none
        }

        .game-header p {
            color: rgba(255, 255, 255, .5);
            font-size: .85rem;
            margin-top: 4px
        }

        /* Game layout */
        .game-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px 16px 30px
        }

        /* Info bar */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap
        }

        .info-box {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 10px;
            padding: 8px 16px;
            text-align: center;
            flex: 1;
            min-width: 80px
        }

        .info-box .label {
            font-size: .65rem;
            color: rgba(255, 255, 255, .4);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700
        }

        .info-box .value {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--accent)
        }

        .info-box .value.gold {
            color: var(--gold)
        }

        .info-box .value.green {
            color: var(--green)
        }

        .info-box .value.red {
            color: var(--red)
        }

        .info-box .value.pink {
            color: var(--pink)
        }

        /* Score target */
        .blind-bar {
            background: var(--panel);
            border: 1px solid rgba(139, 92, 246, .15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            text-align: center
        }

        .blind-bar .blind-name {
            font-size: .8rem;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .blind-bar .score-progress {
            margin-top: 6px;
            height: 8px;
            background: rgba(255, 255, 255, .06);
            border-radius: 4px;
            overflow: hidden
        }

        .blind-bar .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--pink));
            border-radius: 4px;
            transition: width .5s ease
        }

        .blind-bar .score-text {
            font-size: .75rem;
            color: rgba(255, 255, 255, .5);
            margin-top: 4px
        }

        /* Hand type display */
        .hand-type-display {
            text-align: center;
            margin-bottom: 10px;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .hand-type-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(247, 212, 82, .3)
        }

        .hand-type-score {
            font-size: .8rem;
            color: rgba(255, 255, 255, .5);
            margin-top: 2px
        }

        /* Cards area */
        .cards-area {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            min-height: 160px;
            align-items: center
        }

        .card {
            width: 80px;
            height: 120px;
            background: linear-gradient(145deg, #1a1a3e, #12122a);
            border: 2px solid rgba(255, 255, 255, .1);
            border-radius: 10px;
            cursor: pointer;
            transition: .3s;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, .3)
        }

        .card.selected {
            transform: translateY(-16px);
            border-color: var(--accent);
            box-shadow: 0 12px 30px rgba(139, 92, 246, .5)
        }

        .card .card-rank {
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1
        }

        .card .card-suit {
            font-size: 1.8rem;
            line-height: 1
        }

        .card .card-corner {
            position: absolute;
            font-size: .6rem;
            font-weight: 800
        }

        .card .card-corner.top {
            top: 4px;
            left: 6px
        }

        .card .card-corner.bottom {
            bottom: 4px;
            right: 6px;
            transform: rotate(180deg)
        }

        .card.heart,
        .card.diamond {
            color: var(--red)
        }

        .card.spade,
        .card.club {
            color: var(--accent2)
        }

        /* Card scoring animation */
        .card.scoring {
            animation: cardPulse .5s ease;
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(247, 212, 82, .5)
        }

        @keyframes cardPulse {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1)
            }
        }

        /* Action buttons */
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap
        }

        .action-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 800;
            font-size: .9rem;
            cursor: pointer;
            transition: .3s;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .action-btn:disabled {
            opacity: .3;
            cursor: not-allowed
        }

        .play-btn {
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            color: #fff;
            box-shadow: 0 4px 15px rgba(139, 92, 246, .3)
        }

        .play-btn:hover:not(:disabled) {
            box-shadow: 0 6px 25px rgba(139, 92, 246, .5);
            transform: translateY(-2px)
        }

        .discard-btn {
            background: linear-gradient(135deg, var(--red), #dc2626);
            color: #fff;
            box-shadow: 0 4px 15px rgba(239, 68, 68, .2)
        }

        .discard-btn:hover:not(:disabled) {
            box-shadow: 0 6px 25px rgba(239, 68, 68, .4);
            transform: translateY(-2px)
        }

        .sort-btn {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            color: var(--accent2);
            padding: 8px 16px;
            font-size: .75rem
        }

        /* Jokers area */
        .jokers-area {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px
        }

        .jokers-title {
            font-size: .7rem;
            color: rgba(255, 255, 255, .4);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 8px
        }

        .jokers-grid {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            min-height: 60px;
            align-items: center
        }

        .joker-card {
            width: 65px;
            height: 90px;
            background: linear-gradient(145deg, #1e1b4b, #312e81);
            border: 2px solid rgba(139, 92, 246, .3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: default
        }

        .joker-card .joker-emoji {
            font-size: 1.6rem
        }

        .joker-card .joker-label {
            font-size: .5rem;
            color: rgba(255, 255, 255, .6);
            text-align: center;
            margin-top: 2px;
            font-weight: 700;
            padding: 0 2px
        }

        .joker-card:hover .joker-tooltip {
            display: block
        }

        .joker-tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1e1b4b;
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: .7rem;
            white-space: nowrap;
            z-index: 10;
            color: var(--accent2);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .5)
        }

        .no-jokers {
            color: rgba(255, 255, 255, .2);
            font-size: .8rem;
            text-align: center;
            padding: 15px
        }

        /* Shop overlay */
        .shop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .85);
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px
        }

        .shop-overlay.active {
            display: flex
        }

        .shop {
            background: var(--panel2);
            border: 1px solid rgba(139, 92, 246, .2);
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto
        }

        .shop h2 {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--gold);
            text-align: center;
            margin-bottom: 4px
        }

        .shop-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, .4);
            font-size: .8rem;
            margin-bottom: 16px
        }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 16px
        }

        .shop-item {
            background: linear-gradient(145deg, #1e1b4b, #312e81);
            border: 2px solid rgba(139, 92, 246, .2);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: .3s
        }

        .shop-item:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 20px rgba(139, 92, 246, .3);
            transform: translateY(-3px)
        }

        .shop-item .item-emoji {
            font-size: 2rem;
            margin-bottom: 6px
        }

        .shop-item .item-name {
            font-size: .8rem;
            font-weight: 800;
            color: var(--accent2);
            margin-bottom: 4px
        }

        .shop-item .item-desc {
            font-size: .65rem;
            color: rgba(255, 255, 255, .5);
            line-height: 1.4;
            margin-bottom: 6px
        }

        .shop-item .item-price {
            font-size: .85rem;
            font-weight: 900;
            color: var(--gold)
        }

        .shop-item.sold {
            opacity: .3;
            pointer-events: none
        }

        .shop-btn {
            display: block;
            margin: 0 auto;
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--green), #16a34a);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 800;
            font-size: .9rem;
            cursor: pointer;
            transition: .3s;
            text-transform: uppercase
        }

        .shop-btn:hover {
            box-shadow: 0 4px 20px rgba(34, 197, 94, .4);
            transform: translateY(-2px)
        }

        /* Score popup */
        .score-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 60;
            pointer-events: none;
            text-align: center;
            animation: popIn .8s ease forwards;
            opacity: 0
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(.5)
            }

            30% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2)
            }

            60% {
                transform: translate(-50%, -50%) scale(1)
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -70%) scale(1)
            }
        }

        .score-popup .big-score {
            font-size: 3rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(247, 212, 82, .5)
        }

        .score-popup .score-detail {
            font-size: 1rem;
            color: var(--accent2);
            font-weight: 700
        }

        /* Game over */
        .gameover-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .9);
            z-index: 70;
            display: none;
            align-items: center;
            justify-content: center
        }

        .gameover-overlay.active {
            display: flex
        }

        .gameover {
            text-align: center;
            padding: 30px
        }

        .gameover h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px
        }

        .gameover .final-score {
            font-size: 1.2rem;
            color: var(--accent2);
            margin-bottom: 8px
        }

        .gameover .stats {
            font-size: .9rem;
            color: rgba(255, 255, 255, .5);
            margin-bottom: 20px;
            line-height: 1.8
        }

        .gameover button {
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--accent), var(--pink));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: .3s
        }

        .gameover button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(139, 92, 246, .5)
        }

        /* Responsive */
        @media(max-width:600px) {
            .card {
                width: 60px;
                height: 90px
            }

            .card .card-rank {
                font-size: 1.1rem
            }

            .card .card-suit {
                font-size: 1.3rem
            }

            .joker-card {
                width: 50px;
                height: 70px
            }

            .joker-card .joker-emoji {
                font-size: 1.2rem
            }
        }

        /* Background effect */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(ellipse at 30% 20%, rgba(139, 92, 246, .06) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(34, 211, 238, .04) 0%, transparent 60%)
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <a href="../index.html" class="back-btn">← Back to Site</a>

    <div class="game-header">
        <h1>🃏 ROYAL ROGUE</h1>
        <p>Roguelike Deck Builder</p>
    </div>

    <div class="game-container">
        <!-- Info bar -->
        <div class="info-bar">
            <div class="info-box">
                <div class="label">Ante</div>
                <div class="value pink" id="anteDisplay">1</div>
            </div>
            <div class="info-box">
                <div class="label">Round</div>
                <div class="value" id="roundDisplay">1</div>
            </div>
            <div class="info-box">
                <div class="label">Hands</div>
                <div class="value green" id="handsDisplay">4</div>
            </div>
            <div class="info-box">
                <div class="label">Discards</div>
                <div class="value red" id="discardsDisplay">3</div>
            </div>
            <div class="info-box">
                <div class="label">Money</div>
                <div class="value gold" id="moneyDisplay">$4</div>
            </div>
            <div class="info-box">
                <div class="label">Score</div>
                <div class="value" id="scoreDisplay">0</div>
            </div>
        </div>

        <!-- Blind info -->
        <div class="blind-bar">
            <div class="blind-name" id="blindName">Small Blind</div>
            <div class="score-progress">
                <div class="score-fill" id="scoreFill" style="width:0%"></div>
            </div>
            <div class="score-text" id="scoreText">0 / 300</div>
        </div>

        <!-- Hand type -->
        <div class="hand-type-display">
            <div class="hand-type-name" id="handTypeName">Select up to 5 cards</div>
            <div class="hand-type-score" id="handTypeScore"></div>
        </div>

        <!-- Cards -->
        <div class="cards-area" id="cardsArea"></div>

        <!-- Actions -->
        <div class="actions">
            <button class="action-btn sort-btn" onclick="sortHand()">⇅ Sort</button>
            <button class="action-btn play-btn" id="playBtn" onclick="playHand()" disabled>▶ Play Hand</button>
            <button class="action-btn discard-btn" id="discardBtn" onclick="discardCards()" disabled>🗑 Discard</button>
        </div>

        <!-- Jokers -->
        <div class="jokers-area">
            <div class="jokers-title">🃏 Jokers (0/5)</div>
            <div class="jokers-grid" id="jokersGrid">
                <div class="no-jokers">No jokers yet — buy some from the shop!</div>
            </div>
        </div>
    </div>

    <!-- Shop overlay -->
    <div class="shop-overlay" id="shopOverlay">
        <div class="shop">
            <h2>🏪 NEON SHOP</h2>
            <div class="shop-subtitle">Spend your cash on powerful jokers</div>
            <div class="shop-items" id="shopItems"></div>
            <button class="shop-btn" onclick="closeShop()">Continue →</button>
        </div>
    </div>

    <!-- Game over overlay -->
    <div class="gameover-overlay" id="gameoverOverlay">
        <div class="gameover">

            <div class="final-score" id="goScore"></div>
            <div class="stats" id="goStats"></div>
            <button onclick="restartGame()">🔄 Play Again</button>
        </div>
    </div>

    <script>
        // ===== GAME STATE =====
        let state = {};
        const SUITS = ['heart', 'diamond', 'club', 'spade'];
        const SUIT_SYMBOLS = { heart: '♥', diamond: '♦', club: '♣', spade: '♠' };

        // Poker hand definitions: [name, base_chips, base_mult, min_level]

        };

        // Blinds per ante
        const BLINDS = [
            { name: 'Small Blind', mult: 1 },
            { name: 'Big Blind', mult: 1.5 },
            { name: 'Boss Blind', mult: 2.5 }
        ];

        // Base target score
        const BASE_TARGET = 300;

        // Joker definitions
        const ALL_JOKERS = [
            { id: 'jk_mult2', emoji: '🎭', name: 'Jester', desc: '+4 Mult to all hands', effect: 'mult_add', value: 4, price: 4 },
            { id: 'jk_chips', emoji: '💎', name: 'Diamond', desc: '+50 Chips to all hands', effect: 'chips_add', value: 50, price: 4 },
            { id: 'jk_pair', emoji: '👯', name: 'Twins', desc: 'x2 Mult if hand is Pair+', effect: 'pair_mult', value: 2, price: 5 },
            { id: 'jk_heart', emoji: '❤️', name: 'Heart', desc: '+30 Chips per Heart card played', effect: 'suit_chips', suit: 'heart', value: 30, price: 5 },
            { id: 'jk_spade', emoji: '♠️', name: 'Ace of Spades', desc: '+30 Chips per Spade card played', effect: 'suit_chips', suit: 'spade', value: 30, price: 5 },
            { id: 'jk_face', emoji: '👑', name: 'Crown', desc: '+20 Mult if hand has face card', effect: 'face_mult', value: 20, price: 6 },
            { id: 'jk_flush', emoji: '🌊', name: 'Tidal', desc: 'x3 Mult if Flush or better', effect: 'flush_mult', value: 3, price: 7 },
            { id: 'jk_money', emoji: '💰', name: 'Banker', desc: '+$3 at end of round', effect: 'money', value: 3, price: 5 },
            { id: 'jk_hand', emoji: '✋', name: 'Extra Hand', desc: '+1 Hand per round', effect: 'extra_hand', value: 1, price: 6 },
            { id: 'jk_discard', emoji: '🔄', name: 'Recycler', desc: '+1 Discard per round', effect: 'extra_discard', value: 1, price: 4 },
            { id: 'jk_wild', emoji: '🃏', name: 'Wild Card', desc: 'x1.5 Mult to everything', effect: 'global_mult', value: 1.5, price: 6 },
            { id: 'jk_lucky', emoji: '🍀', name: 'Lucky Clover', desc: '20% chance for x4 Mult', effect: 'lucky', value: 4, price: 5 },
            { id: 'jk_steel', emoji: '⚔️', name: 'Steel', desc: '+100 Chips, -1 Mult', effect: 'steel', chips: 100, mult: -1, price: 4 },
            { id: 'jk_3kind', emoji: '🎲', name: 'Gambler', desc: 'x3 Mult if Three of a Kind+', effect: '3kind_mult', value: 3, price: 6 },
            { id: 'jk_straight', emoji: '📏', name: 'Ruler', desc: 'x2.5 Mult if Straight+', effect: 'straight_mult', value: 2.5, price: 6 },
        ];

        function initGame() {
            state = {
                deck: [],
                hand: [],
                selected: [],
                jokers: [],
                ante: 1,
                round: 1,
                blind: 0,
                hands: 4,
                discards: 3,
                money: 4,
                roundScore: 0,
                totalScore: 0,
                handsPlayed: 0,
                bestHand: '',
                bestHandScore: 0,
                maxAnte: 8
            };
            buildDeck();
            dealHand();
            updateUI();
        }

        function buildDeck() {
            state.deck = [];
            for (const suit of SUITS) {
                for (const rank of RANKS) {
                    state.deck.push({ suit, rank, value: RANK_VALUES[rank] });
                }
            }
            shuffle(state.deck);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        function dealHand() {
            // If deck has < 8 cards, rebuild
            if (state.deck.length < 8) buildDeck();
            state.hand = state.deck.splice(0, 8);
            state.selected = [];
            renderCards();
            updateHandPreview();
        }

        function getTarget() {
            const blindMult = BLINDS[state.blind].mult;
            return Math.ceil(BASE_TARGET * state.ante * blindMult);
        }

        // ===== CARD RENDERING =====
        function renderCards() {
            const area = document.getElementById('cardsArea');
            area.innerHTML = '';
            state.hand.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card ' + card.suit + (state.selected.includes(i) ? ' selected' : '');
                div.onclick = () => toggleSelect(i);
                const sym = SUIT_SYMBOLS[card.suit];
                div.innerHTML = `
      <div class="card-corner top">${card.rank}${sym}</div>
      <div class="card-rank">${card.rank}</div>
      <div class="card-suit">${sym}</div>
      <div class="card-corner bottom">${card.rank}${sym}</div>
    `;
                area.appendChild(div);
            });
        }

        function toggleSelect(i) {
            const idx = state.selected.indexOf(i);
            if (idx >= 0) {
                state.selected.splice(idx, 1);
            } else if (state.selected.length < 5) {
                state.selected.push(i);
            }
            renderCards();
            updateHandPreview();
            updateButtons();
        }

        function updateButtons() {
            document.getElementById('playBtn').disabled = state.selected.length === 0;
            document.getElementById('discardBtn').disabled = state.selected.length === 0 || state.discards <= 0;
        }

        function sortHand() {
            state.hand.sort((a, b) => a.value - b.value);
            state.selected = [];
            renderCards();
            updateHandPreview();
            updateButtons();
        }

        // ===== POKER HAND EVALUATION =====
        function evaluateHand(cards) {
            if (cards.length === 0) return { type: 'High Card', ...HAND_TYPES['High Card'], cards: [] };

            const sorted = [...cards].sort((a, b) => b.value - a.value);
            const ranks = sorted.map(c => c.value);
            const suits = sorted.map(c => c.suit);

            // Count ranks
            const rankCount = {};
            ranks.forEach(r => rankCount[r] = (rankCount[r] || 0) + 1);
            const counts = Object.values(rankCount).sort((a, b) => b - a);

            const isFlush = cards.length === 5 && new Set(suits).size === 1;

            // Check straight
            let isStraight = false;
            if (cards.length === 5) {
                const unique = [...new Set(ranks)].sort((a, b) => a - b);
                if (unique.length === 5) {
                    isStraight = (unique[4] - unique[0] === 4);
                    // Ace-low straight (A-2-3-4-5)
                    if (!isStraight && unique[4] === 14 && unique[0] === 2 && unique[3] === 5) {
                        isStraight = true;
                    }
                }
            }

            const isRoyal = isFlush && isStraight && ranks.includes(14) && ranks.includes(13);

            let type = 'High Card';
            if (isRoyal) type = 'Royal Flush';
            else if (isFlush && isStraight) type = 'Straight Flush';
            else if (counts[0] === 4) type = 'Four of a Kind';
            else if (counts[0] === 3 && counts[1] === 2) type = 'Full House';
            else if (isFlush) type = 'Flush';
            else if (isStraight) type = 'Straight';
            else if (counts[0] === 3) type = 'Three of a Kind';
            else if (counts[0] === 2 && counts[1] === 2) type = 'Two Pair';
            else if (counts[0] === 2) type = 'Pair';

            const ht = HAND_TYPES[type];
            return { type, chips: ht.chips, mult: ht.mult, cards: sorted };
        }

        function updateHandPreview() {
            const selectedCards = state.selected.map(i => state.hand[i]);
            const eval_ = evaluateHand(selectedCards);
            document.getElementById('handTypeName').textContent = state.selected.length > 0 ? eval_.type : 'Select up to 5 cards';
            if (state.selected.length > 0) {
                document.getElementById('handTypeScore').textContent = `${eval_.chips} chips × ${eval_.mult} mult`;
            } else {
                document.getElementById('handTypeScore').textContent = '';
            }
        }

        // ===== SCORING WITH JOKERS =====
        function calculateScore(handResult, playedCards) {
            let chips = handResult.chips;
            let mult = handResult.mult;

            // Add chip value of each card played
            playedCards.forEach(c => {
                chips += c.value;
            });

            // Apply jokers
            state.jokers.forEach(j => {
                switch (j.effect) {
                    case 'mult_add':
                        mult += j.value;
                        break;
                    case 'chips_add':
                        chips += j.value;
                        break;
                    case 'pair_mult':
                        if (['Pair', 'Two Pair', 'Three of a Kind', 'Full House', 'Four of a Kind'].includes(handResult.type)) {
                            mult *= j.value;
                        }
                        break;
                    case 'suit_chips':
                        playedCards.forEach(c => { if (c.suit === j.suit) chips += j.value; });
                        break;
                    case 'face_mult':
                        if (playedCards.some(c => ['J', 'Q', 'K'].includes(c.rank))) mult += j.value;
                        break;
                    case 'flush_mult':
                        if (['Flush', 'Straight Flush', 'Royal Flush'].includes(handResult.type)) mult *= j.value;
                        break;
                    case 'global_mult':
                        mult *= j.value;
                        break;
                    case 'lucky':
                        if (Math.random() < 0.2) mult *= j.value;
                        break;
                    case 'steel':
                        chips += j.chips;
                        mult += j.mult;
                        break;
                    case '3kind_mult':
                        if (['Three of a Kind', 'Full House', 'Four of a Kind'].includes(handResult.type)) mult *= j.value;
                        break;
                    case 'straight_mult':
                        if (['Straight', 'Straight Flush', 'Royal Flush'].includes(handResult.type)) mult *= j.value;
                        break;
                }
            });

            return Math.ceil(chips * mult);
        }

        // ===== PLAY HAND =====
        async function playHand() {
            if (state.selected.length === 0 || state.hands <= 0) return;
            document.getElementById('playBtn').disabled = true;
            document.getElementById('discardBtn').disabled = true;

            const playedCards = state.selected.map(i => state.hand[i]);
            const handResult = evaluateHand(playedCards);
            const score = calculateScore(handResult, playedCards);

            state.handsPlayed++;
            if (score > state.bestHandScore) {
                state.bestHandScore = score;
                state.bestHand = handResult.type;
            }

            // Animate scoring cards
            const cardEls = document.querySelectorAll('.card');
            state.selected.forEach(i => {
                if (cardEls[i]) cardEls[i].classList.add('scoring');
            });

            // Show score popup
            showScorePopup(score, handResult.type, handResult.chips, handResult.mult);

            await sleep(800);

            state.roundScore += score;
            state.totalScore += score;
            state.hands--;

            // Remove played cards from hand
            const remaining = state.hand.filter((_, i) => !state.selected.includes(i));
            state.hand = remaining;
            state.selected = [];

            // Check if beat the blind
            if (state.roundScore >= getTarget()) {
                updateUI();
                await sleep(500);
                winRound();
                return;
            }

            // Check if out of hands
            if (state.hands <= 0) {
                updateUI();
                await sleep(500);
                gameOver(false);
                return;
            }

            // Draw new cards up to 8
            while (state.hand.length < 8 && state.deck.length > 0) {
                state.hand.push(state.deck.pop());
            }
            if (state.hand.length < 8) {
                buildDeck();
                while (state.hand.length < 8) state.hand.push(state.deck.pop());
            }

            renderCards();
            updateUI();
            updateButtons();
        }

        function discardCards() {
            if (state.selected.length === 0 || state.discards <= 0) return;
            state.discards--;

            const remaining = state.hand.filter((_, i) => !state.selected.includes(i));
            state.hand = remaining;
            state.selected = [];

            // Draw new cards
            while (state.hand.length < 8 && state.deck.length > 0) {
                state.hand.push(state.deck.pop());
            }
            if (state.hand.length < 8) {
                buildDeck();
                while (state.hand.length < 8) state.hand.push(state.deck.pop());
            }

            renderCards();
            updateHandPreview();
            updateUI();
            updateButtons();
        }

        // ===== ROUND WIN =====
        function winRound() {
            // Award money
            let earnings = 3 + state.round;
            // Joker money bonuses
            state.jokers.forEach(j => {
                if (j.effect === 'money') earnings += j.value;
            });
            state.money += earnings;

            // Advance blind
            state.blind++;
            if (state.blind >= 3) {
                state.blind = 0;
                state.ante++;
                if (state.ante > state.maxAnte) {
                    gameOver(true);
                    return;
                }
            }
            state.round++;

            // Reset round
            state.roundScore = 0;

            // Calculate hands/discards with joker bonuses
            let baseHands = 4;
            let baseDiscards = 3;
            state.jokers.forEach(j => {
                if (j.effect === 'extra_hand') baseHands += j.value;
                if (j.effect === 'extra_discard') baseDiscards += j.value;
            });
            state.hands = baseHands;
            state.discards = baseDiscards;

            // Show shop
            openShop(earnings);
        }

        // ===== SHOP =====
        function openShop(earnings) {
            const overlay = document.getElementById('shopOverlay');
            const itemsDiv = document.getElementById('shopItems');
            overlay.classList.add('active');

            // Pick 3 random jokers not already owned
            const owned = new Set(state.jokers.map(j => j.id));
            const available = ALL_JOKERS.filter(j => !owned.has(j.id));
            shuffle(available);
            const forSale = available.slice(0, 3);

            let html = '';
            forSale.forEach((j, i) => {
                html += `<div class="shop-item" id="shopItem${i}" onclick="buyJoker(${i})">
      <div class="item-emoji">${j.emoji}</div>
      <div class="item-name">${j.name}</div>
      <div class="item-desc">${j.desc}</div>
      <div class="item-price">$${j.price}</div>
    </div>`;
            });

            // Also offer a "skip for cash" option
            html += `<div class="shop-item" onclick="skipReward()">
    <div class="item-emoji">💵</div>
    <div class="item-name">Skip</div>
    <div class="item-desc">Get +$2 bonus</div>
    <div class="item-price" style="color:var(--green)">Free</div>
  </div>`;

            itemsDiv.innerHTML = html;
            window._shopItems = forSale;

            document.querySelector('.shop-subtitle').textContent = `You earned $${earnings} this round • You have $${state.money}`;
        }

        function buyJoker(idx) {
            const j = window._shopItems[idx];
            if (!j || state.money < j.price || state.jokers.length >= 5) return;
            state.money -= j.price;
            state.jokers.push({ ...j });
            document.getElementById('shopItem' + idx).classList.add('sold');
            document.querySelector('.shop-subtitle').textContent = `Bought ${j.name}! • $${state.money} remaining`;
            renderJokers();
            updateUI();
        }

        function skipReward() {
            state.money += 2;
            updateUI();
            closeShop();
        }

        function closeShop() {
            document.getElementById('shopOverlay').classList.remove('active');
            buildDeck();
            dealHand();
            updateUI();
        }

        // ===== JOKER RENDERING =====
        function renderJokers() {
            const grid = document.getElementById('jokersGrid');
            const title = document.querySelector('.jokers-title');
            title.textContent = `🃏 Jokers (${state.jokers.length}/5)`;

            if (state.jokers.length === 0) {
                grid.innerHTML = '<div class="no-jokers">No jokers yet — buy some from the shop!</div>';
                return;
            }

            grid.innerHTML = state.jokers.map(j => `
    <div class="joker-card">
      <div class="joker-emoji">${j.emoji}</div>
      <div class="joker-label">${j.name}</div>
      <div class="joker-tooltip">${j.desc}</div>
    </div>
  `).join('');
        }

        // ===== UI UPDATE =====
        function updateUI() {
            document.getElementById('anteDisplay').textContent = state.ante;
            document.getElementById('roundDisplay').textContent = state.round;
            document.getElementById('handsDisplay').textContent = state.hands;
            document.getElementById('discardsDisplay').textContent = state.discards;
            document.getElementById('moneyDisplay').textContent = '$' + state.money;
            document.getElementById('scoreDisplay').textContent = state.roundScore;
            document.getElementById('blindName').textContent = BLINDS[state.blind].name + ' (Ante ' + state.ante + ')';

            const target = getTarget();
            const pct = Math.min(100, (state.roundScore / target) * 100);
            document.getElementById('scoreFill').style.width = pct + '%';
            document.getElementById('scoreText').textContent = state.roundScore + ' / ' + target;

            renderJokers();
            updateButtons();
        }

        // ===== SCORE POPUP =====
        function showScorePopup(score, type, chips, mult) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.innerHTML = `
    <div class="big-score">+${score}</div>
    <div class="score-detail">${type} • ${chips}×${mult}</div>
  `;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // ===== GAME OVER =====
        function gameOver(won) {
            const overlay = document.getElementById('gameoverOverlay');
            overlay.classList.add('active');

            if (won) {
                document.getElementById('goTitle').textContent = '🏆 YOU WIN!';
                document.getElementById('goTitle').style.color = 'var(--gold)';
            } else {
                document.getElementById('goTitle').textContent = '💀 GAME OVER';
                document.getElementById('goTitle').style.color = 'var(--red)';
            }

            document.getElementById('goScore').textContent = 'Total Score: ' + state.totalScore.toLocaleString();
            document.getElementById('goStats').innerHTML = `
    Reached Ante ${state.ante} • Round ${state.round}<br>
    Hands Played: ${state.handsPlayed}<br>
    Best Hand: ${state.bestHand} (+${state.bestHandScore.toLocaleString()})<br>
    Jokers Collected: ${state.jokers.length}
  `;
        }

        function restartGame() {
            document.getElementById('gameoverOverlay').classList.remove('active');
            initGame();
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // Start!
        initGame();
    </script>
</body>
